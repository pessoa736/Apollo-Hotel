{% load static %}

<div id="modal" class="modal">

  <div class="modal-content">

    <span class="close"><i class="bi bi-x"></i></span>

    <div class="logo">
      <img src="{% static "icons/Logo.svg" %}" alt="Apollo Hotel">
    </div>

    <form action="{% url 'reservations' %}" method="POST">
      {% csrf_token %}
      <!-- Nome -->
      <div class="form-group">
        <label>Nome Completo</label>
        <input name="name" type="text" placeholder="Digite aqui">
      </div>

      <!-- Datas -->
      <div class="form-row">
        <div class="form-group">
          <label>Data de entrada</label>
          <input name="check_in" type="date">
        </div>

        <div class="form-group">
          <label>Data de saída</label>
          <input name="check_out" type="date">
        </div>
      </div>

      <!-- Categoria -->
      <div class="form-group">
        <label>Categoria de acomodação</label>
        <select name="type_of_room">
          <option>Suíte Prince</option>
          <option>Casal</option>
          <option>Solteiro</option>
        </select>
      </div>

      <!-- Pessoas -->
      <div class="form-row">
        <div class="form-group">
          <label>Adultos</label>
          <input name="adult" type="number" value="0">
        </div>

        <div class="form-group">
          <label>Crianças</label>
          <input name="child" type="number" value="0">
        </div>
      </div>

      <button type="submit" class="btn">Fazer Reserva</button>

    </form>

  </div>

</div>
